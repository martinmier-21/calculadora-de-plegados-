<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Topes - Martín</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; background-image: url('https://images.unsplash.com/photo-1598520106830-8c45c2f3f960?q=80&w=1000&auto=format&fit=crop'); background-size: cover; background-position: center; background-attachment: fixed; color: white; padding: 10px; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 550px; width: 95%; background: rgba(25, 25, 25, 0.97); padding: 25px; border-radius: 20px; border: 1px solid rgba(255, 172, 28, 0.5); box-shadow: 0 15px 50px rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        h2 { text-align: center; color: #ffac1c; margin-top: 0; margin-bottom: 20px; text-transform: uppercase; font-size: 18px; letter-spacing: 1px; }
        
        /* Título para el selector para que sea intuitivo */
        .selector-label { display: block; font-size: 10px; color: #ffac1c; text-align: center; margin-bottom: 8px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        
        .selector-plegados { display: flex; justify-content: space-around; margin-bottom: 20px; background: #1a1a1a; padding: 5px; border-radius: 12px; border: 1px solid #444; }
        .opcion { text-align: center; cursor: pointer; opacity: 0.5; transition: 0.2s; flex: 1; font-size: 12px; padding: 10px 0; border-radius: 8px; }
        .opcion.active { opacity: 1; color: #121212; background: #ffac1c; font-weight: bold; }
        .preview-svg { background: #000; border-radius: 12px; margin-bottom: 20px; display: flex; flex-direction: column; justify-content: center; padding: 15px; border: 1px solid #ffac1c; min-height: 120px; align-items: center; cursor: pointer; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { display: block; font-size: 10px; margin-bottom: 4px; color: #aaa; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #444; background: #111; color: white; font-size: 15px; box-sizing: border-box; outline: none; text-align: center; }
        .c-1 { border-color: #ff4d4d !important; } .c-2 { border-color: #4d94ff !important; } .c-3 { border-color: #55ff55 !important; } .c-4 { border-color: #ffffff !important; } .c-5 { border-color: #ff55ff !important; } .c-6 { border-color: #ffff55 !important; } .c-7 { border-color: #4dffff !important; }
        .btn-calc { width: 100%; padding: 18px; background: #ffac1c; color: #121212; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .resultado { margin-top: 20px; background: #050505; padding: 20px; border-radius: 15px; border: 2px solid #ffac1c; display: none; }
        .res-grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 15px; }
        .val { font-weight: 900; color: #ffac1c; font-size: 28px; display: block; }
        .topes-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .col-tope { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; }
        .col-title { font-size: 9px; color: #ffac1c; text-align: center; display: block; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .tope-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2>CALCULADOR DE TOPES - MARTÍN</h2>

    <span class="selector-label">Cantidad de Plegados</span>
    <div class="selector-plegados">
        <div id="sel1" class="opcion active" onclick="setPlegados(1)">1 plegado</div>
        <div id="sel2" class="opcion" onclick="setPlegados(2)">2 plegados</div>
        <div id="sel3" class="opcion" onclick="setPlegados(3)">3 plegados</div>
        <div id="sel4" class="opcion" onclick="setPlegados(4)">4 plegados</div>
        <div id="sel5" class="opcion" onclick="setPlegados(5)">5 plegados</div>
        <div id="sel6" class="opcion" onclick="setPlegados(6)">6 plegados</div>
    </div>

    <div class="preview-svg" id="svg-container">
        <div id="draw-area"></div>
    </div>

    <div class="grid-inputs" id="input-container"></div>

    <div class="grid-inputs">
        <div><label>ESPESOR (MM)</label><input type="number" id="espesor" value="6"></div>
        <div><label>MATRIZ V</label><input type="number" id="matrizV" value="40"></div>
    </div>
    <div style="margin-bottom: 15px;"><label>LARGO PIEZA (MM)</label><input type="number" id="largoPieza" placeholder="2000" style="border-color: #ffac1c;"></div>

    <button class="btn-calc" onclick="procesar()">CALCULAR</button>

    <div id="resultadoBox" class="resultado">
        <div class="res-grid-main">
            <div class="res-block">
                <span style="font-size: 10px; color: #888;">DESARROLLO</span>
                <span class="val"><span id="resDes">0</span><span style="font-size:12px"> MM</span></span>
            </div>
            <div class="res-block">
                <span style="font-size: 10px; color: #888;">PESO TOTAL</span>
                <span class="val" style="color: #55ff55;"><span id="resPeso">0</span><span style="font-size:12px"> KG</span></span>
            </div>
        </div>
        <div class="topes-container">
            <div class="col-tope"><span class="col-title">DESDE ALA 1, COLOCAR TOPE A </span><div id="listaTopesIzq"></div></div>
            <div class="col-tope"><span class="col-title">DESDE ALA 2, COLOCAR TOPE A</span><div id="listaTopesDer"></div></div>
        </div>
    </div>
</div>
